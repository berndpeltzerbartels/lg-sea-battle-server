<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG Sea Battle</title>
    <script type="module" crossorigin src="/sea-battle/assets/index-DhsKvgDi.js"></script>
    <link rel="modulepreload" crossorigin href="/sea-battle/assets/styles-LMnEMN3o.js">
    <link rel="modulepreload" crossorigin href="/sea-battle/assets/logDepthDeclaration-C8ALh9s8.js">
    <link rel="modulepreload" crossorigin href="/sea-battle/assets/helperFunctions-C7NJyMPq.js">
    <link rel="modulepreload" crossorigin href="/sea-battle/assets/fogFragment-ax-Xxq8c.js">
    <link rel="modulepreload" crossorigin href="/sea-battle/assets/default.fragment-CYyny_jW.js">
    <link rel="modulepreload" crossorigin href="/sea-battle/assets/vertexColorMixing-Cmgbmnop.js">
    <link rel="modulepreload" crossorigin href="/sea-battle/assets/default.vertex-DBleUrqj.js">
    <link rel="stylesheet" crossorigin href="/sea-battle/assets/styles-BMRiq-Ua.css">
  </head>
  <body>
    <script>
      window.__seaBattleShowStartupError = function (title, detail) {
        const message = detail && (detail.stack || detail.message || String(detail));
        document.body.dataset.startupError = message || title;
        document.body.innerHTML =
          '<main class="startup-error">' +
          '<h1>' + String(title || 'Sea Battle startup failed') + '</h1>' +
          '<p>' + String(message || 'Unknown JavaScript error') + '</p>' +
          '<small>Open the browser console for the full trace.</small>' +
          '</main>';
      };
      window.addEventListener("error", function (event) {
        window.__seaBattleShowStartupError("Sea Battle JavaScript error", event.error || event.message);
      });
      window.addEventListener("unhandledrejection", function (event) {
        window.__seaBattleShowStartupError("Sea Battle startup failed", event.reason);
      });
    </script>
    <canvas id="renderCanvas"></canvas>
    <div id="sinkingWaterOverlay" class="sinking-water-overlay" aria-hidden="true"></div>
    <div class="mobile-orientation-hint" aria-hidden="true">
      <strong>Rotate device</strong>
      <span>Sea Battle is built for landscape play.</span>
    </div>
    <div class="hud">
      <div class="compass" aria-hidden="true">
        <div id="compassRose" class="compass-rose">
          <span>N</span>
          <span>E</span>
          <span>S</span>
          <span>W</span>
        </div>
        <div id="compassPointer" class="compass-pointer"></div>
        <div id="compassHeading" class="compass-heading">HDG 000</div>
      </div>
      <div class="nav-panel">
        <div class="nav-instrument nav-instrument-map">
          <div class="nav-title">Map</div>
          <div class="map-control">
            <div id="mapRowLabels" class="map-row-labels" aria-hidden="true"></div>
            <canvas id="mapCanvas" width="320" height="230"></canvas>
            <div id="mapColumnLabels" class="map-column-labels" aria-hidden="true"></div>
            <input id="mapZoom" type="range" min="0" max="5" step="1" value="1" aria-label="Map zoom" />
            <div class="map-meta">
              <strong id="mapSectorValue">--</strong>
              <span id="mapCoordinateValue">--</span>
            </div>
          </div>
        </div>
      </div>
      <div class="nav-instrument nav-instrument-radar" aria-hidden="true">
        <div class="nav-title">Radar</div>
        <canvas id="radarCanvas" width="300" height="300"></canvas>
        <small id="radarStatus">Clear</small>
      </div>
      <div id="fleetStatusRows" class="fleet-status" aria-hidden="true"></div>
      <div class="player-list" aria-hidden="true">
        <div class="player-list-title">Players</div>
        <div id="playerListRows" class="player-list-rows"></div>
        <button id="resetGameButton" class="reset-game-button" type="button">Restart</button>
      </div>
      <div class="speed">
        <span id="speedValue">0.0</span>
        <small>kn</small>
        <strong id="engineValue">Stop</strong>
        <div class="torpedo-stock">
          <small>Torp</small>
          <strong id="torpedoStockValue">--</strong>
        </div>
        <div class="depth-gauge" style="--depth-ratio: 0">
          <div class="depth-gauge-track">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <strong id="depthValue">Deep</strong>
        </div>
      </div>
      <div class="telegraph" aria-hidden="true">
        <div class="telegraph-title">Engine</div>
        <div id="telegraphScale" class="telegraph-scale"></div>
      </div>
      <div class="rudder" aria-hidden="true">
        <div class="rudder-title">Rudder</div>
        <div class="rudder-gauge">
          <span class="rudder-mark rudder-mark-port">P 35</span>
          <span class="rudder-mark rudder-mark-center">0</span>
          <span class="rudder-mark rudder-mark-starboard">S 35</span>
          <div id="rudderIndicator" class="rudder-indicator"></div>
        </div>
        <strong id="rudderValue">0°</strong>
      </div>
      <button id="mobileFireButton" class="mobile-fire-button" type="button" aria-label="Fire torpedo">Fire</button>
    </div>
  </body>
</html>
