<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #092433;
            color: #f7fbff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                linear-gradient(180deg, rgb(94 137 166 / 86%) 0 44%, rgb(11 41 54 / 94%) 44% 100%),
                radial-gradient(circle at 78% 28%, rgb(230 172 93 / 22%), transparent 28%),
                #092433;
        }

        main {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(280px, 420px) minmax(520px, 1fr);
            gap: clamp(22px, 4vw, 56px);
            align-items: center;
            width: min(1360px, calc(100vw - 44px));
            margin: 0 auto;
            padding: clamp(26px, 5vw, 68px) 0;
        }

        .intro {
            display: grid;
            gap: 18px;
        }

        .kicker,
        label,
        .panel-title {
            color: #a8eeed;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(42px, 7vw, 86px);
            line-height: 0.92;
            letter-spacing: 0;
        }

        .scene-line {
            height: 150px;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid rgb(163 226 232 / 54%);
        }

        .scene-line::before,
        .scene-line::after {
            content: "";
            position: absolute;
            bottom: -2px;
            background: #587a58;
            clip-path: polygon(0 100%, 12% 62%, 18% 70%, 32% 30%, 46% 74%, 60% 48%, 78% 68%, 100% 36%, 100% 100%);
        }

        .scene-line::before {
            left: -6%;
            width: 68%;
            height: 118px;
            opacity: 0.72;
        }

        .scene-line::after {
            right: -8%;
            width: 74%;
            height: 150px;
            opacity: 0.48;
        }

        .start-card,
        .status-card {
            border: 1px solid rgb(191 231 238 / 26%);
            border-radius: 8px;
            background: rgb(3 23 33 / 70%);
            box-shadow: 0 26px 90px rgb(0 0 0 / 30%);
            backdrop-filter: blur(12px);
        }

        .start-card {
            display: grid;
            gap: 18px;
            padding: clamp(18px, 3vw, 28px);
        }

        form,
        .field {
            display: grid;
            gap: 16px;
        }

        .field {
            gap: 7px;
        }

        input,
        select {
            width: 100%;
            min-height: 48px;
            border: 1px solid rgb(196 232 238 / 36%);
            border-radius: 7px;
            background: rgb(2 18 27 / 82%);
            color: #f7fbff;
            font: 900 18px/1 Inter, ui-sans-serif, system-ui, sans-serif;
            letter-spacing: 0;
            outline: none;
        }

        input {
            padding: 10px 14px;
            text-transform: uppercase;
        }

        #nickname {
            text-transform: none;
        }

        select {
            padding: 10px 12px;
        }

        input:focus,
        select:focus {
            border-color: #a8eeed;
            box-shadow: 0 0 0 3px rgb(168 238 237 / 18%);
        }

        .error {
            border-color: #ff7d65;
            box-shadow: 0 0 0 3px rgb(255 125 101 / 16%);
        }

        .message {
            min-height: 16px;
            color: #ffb39f;
            font-size: 12px;
            font-weight: 800;
        }

        button {
            min-height: 50px;
            border: 0;
            border-radius: 7px;
            background: #d9f4f5;
            color: #082330;
            font: 950 14px/1 Inter, ui-sans-serif, system-ui, sans-serif;
            text-transform: uppercase;
            cursor: pointer;
        }

        .status-card {
            display: grid;
            gap: 16px;
            padding: 18px;
            grid-column: 1 / -1;
        }

        .teams {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .team {
            min-height: 220px;
            padding: 12px;
            border: 1px solid rgb(201 232 234 / 18%);
            border-radius: 7px;
            background: rgb(8 35 45 / 62%);
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 10px;
        }

        .team-title,
        .player-alias {
            display: block;
            color: #f7fbff;
            font-size: 15px;
            font-weight: 950;
        }

        .team-players {
            display: grid;
            align-content: start;
            gap: 7px;
            max-height: 290px;
            overflow: auto;
            padding-right: 2px;
        }

        .player-name,
        .player-meta,
        .empty {
            color: #bfd3da;
            font-size: 12px;
            font-weight: 800;
        }

        .player {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 4px 8px;
            align-items: center;
            min-height: 48px;
            padding: 8px 10px;
            border-radius: 6px;
            background: rgb(1 14 20 / 46%);
        }

        .player-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-meta {
            grid-column: 1 / -1;
        }

        .player-score {
            color: #a8eeed;
            font-style: normal;
            font-weight: 900;
            white-space: nowrap;
        }

        @media (max-width: 1160px) {
            main {
                grid-template-columns: 1fr;
                align-items: start;
            }

            .teams {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 840px) {
            main {
                grid-template-columns: 1fr;
                align-items: start;
            }

            .scene-line {
                height: 92px;
            }

            .teams {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="intro" aria-label="Sea Battle">
        <span class="kicker">Multiplayer prototype</span>
        <h1>Sea Battle</h1>
        <div class="scene-line" aria-hidden="true"></div>
    </section>

    <section class="start-card">
        <form xis:binding="login">
            <xis:global-messages/>
            <input type="hidden" xis:binding="id">

            <div class="field">
                <label for="nickname" xis:binding="nickname" xis:error-class="error">Name</label>
                <input id="nickname"
                       xis:binding="nickname"
                       xis:error-class="error"
                       maxlength="40"
                       pattern="[\p{L}0-9 .'-]{2,40}"
                       autocomplete="off"
                       autofocus>
                <div class="message" xis:message-for="nickname"></div>
            </div>

            <div class="field">
                <label for="alias" xis:binding="alias" xis:error-class="error">Kennung</label>
                <input id="alias"
                       xis:binding="alias"
                       xis:error-class="error"
                       maxlength="5"
                       pattern="[A-Za-z0-9]{1,5}"
                       autocomplete="off"
                       autocorrect="off"
                       autocapitalize="characters"
                       spellcheck="false">
                <div class="message" xis:message-for="alias"></div>
            </div>

            <div class="field">
                <label for="team" xis:binding="team" xis:error-class="error">Flotte</label>
                <select id="team" xis:binding="team" xis:error-class="error">
                    <option value="">Flotte wählen</option>
                    <xis:foreach var="team" array="teamOptions">
                        <option value="${team.id}">${team.label}</option>
                    </xis:foreach>
                </select>
                <div class="message" xis:message-for="team"></div>
            </div>

            <input type="hidden" xis:binding="vehicleType" value="torpedo-boat">

            <button type="submit" xis:action="startGame">Einsteigen</button>
        </form>
    </section>

    <section class="status-card" aria-label="Aktueller Spielstand">
        <div class="panel-title">Spieler</div>
        <div class="teams">
            <xis:foreach var="team" array="teams">
                <div class="team">
                    <strong class="team-title">${team.label}</strong>
                    <div class="team-players">
                        <div class="empty" xis:if="empty(team.players)">Frei</div>
                        <xis:foreach var="player" array="${team.players}">
                            <div class="player">
                                <span class="player-name">${player.name}</span>
                                <strong class="player-alias">${player.initials}</strong>
                                <span class="player-meta">${player.ship} / ${player.sector}</span>
                                <em class="player-score">${player.kills}</em>
                            </div>
                        </xis:foreach>
                    </div>
                </div>
            </xis:foreach>
        </div>
    </section>
</main>
</body>
</html>
